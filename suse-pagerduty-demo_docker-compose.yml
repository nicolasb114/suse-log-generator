# Optional: Local Loki instance for testing
# Only use this if you want to test locally without an existing Loki instance

version: "3.8"

services:
  loki:
    image: grafana/loki:2.9.3
    container_name: suse-demo-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  loki-data:
    driver: local
